- name: Bootstrap BFT experiment nodes
  hosts: all
  gather_facts: false
  tasks:
    - name: Run bootstrap script
      no_log: true
      ansible.builtin.command:
        argv:
          - /bin/bash
          - /local/repository/scripts/bootstrap.sh
          - "{{ node_index }}"
          - "{{ num_nodes }}"
          - "{{ node_ip }}"
          - "{{ peers_csv }}"
          - "{{ docker_image }}"
          - "{{ container_prefix }}-{{ node_index }}"
          - "{{ mount_repository }}"
          - "{{ docker_cmd }}"
          - "{{ docker_network_mode }}"
          - "{{ container_ssh_host_port }}"
          - "{{ container_published_ports | default('') }}"
      environment:
        DOCKERHUB_USER: "{{ dockerhub_user | default('') }}"
        DOCKERHUB_TOKEN: "{{ dockerhub_token | default('') }}"
